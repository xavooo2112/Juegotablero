<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELS DESCOCATS 🍻</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="setup-screen" class="container">
        <h1>ELS DESCOCATS 🙉</h1>
        <p style="color: #bbb; margin-bottom: 15px;">Añade a los jugadores para empezar</p>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="Nombre del jugador..." autocomplete="off">
            <button class="btn-add" onclick="addPlayer()">AÑADIR JUGADOR</button>
        </div>
        <ul id="player-list"></ul>
        <button id="start-btn" class="hidden" onclick="startGame()">¡EMPEZAR JUEGO!</button>
    </div>

    <div id="game-screen" class="container hidden">
        <h2 id="turn-display"></h2>
        <div id="challenge-text">TABLERO DE RETOS 🤪</div>

        <div id="board-wrapper">
            <div id="board-container"></div>
        </div>

        <div id="dice-result">🎲</div>
        <button class="btn-roll" onclick="rollDice()">TIRAR DADO</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
